<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <!-- Create New User Form -->
    <div class="create-user">
        <h2>Create New User</h2>
        <form id="createUserForm">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="name" placeholder="Name" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="text" id="phone" placeholder="Phone (optional)">
            </div>
            <button type="submit" class="btn">Create User</button>
        </form>
    </div>

    <!-- Users Table -->
    <div class="user-list">
        <h2>All Users</h2>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Users will be populated here -->
            </tbody>
        </table>
    </div>
</div>

<script>
async function fetchUsers() {
    const res = await fetch("/api/admin/get_users");
    const users = await res.json();
    const tbody = document.querySelector("#usersTable tbody");
    tbody.innerHTML = "";
    users.forEach(u => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.phone || "-"}</td>
            <td><button onclick="deleteUser('${u.uid}')">Remove</button></td>
        `;
        tbody.appendChild(tr);
    });
}

async function deleteUser(uid) {
    if(!confirm("Are you sure you want to delete this user?")) return;
    const res = await fetch(`/api/admin/delete_user/${uid}`, { method: "DELETE" });
    const result = await res.json();
    alert(result.message || result.error);
    fetchUsers();
}

document.getElementById("createUserForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        phone: document.getElementById("phone").value
    };
    const res = await fetch("/api/admin/create_user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
    const result = await res.json();
    alert(result.message || result.error);
    // Clear form
    document.getElementById("createUserForm").reset();
    fetchUsers();
});

// Load users when page loads
fetchUsers();
</script>

<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
.container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
h1, h2 { text-align: center; }
.input-group { margin-bottom: 10px; display: flex; align-items: center; }
.input-group i { margin-right: 10px; }
.input-group input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
.btn { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: #fff; cursor: pointer; }
.btn:hover { background: #0056b3; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
button { padding: 5px 10px; border: none; border-radius: 5px; background: #dc3545; color: #fff; cursor: pointer; }
button:hover { background: #c82333; }
</style>

</body>
</html>
