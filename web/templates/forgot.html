<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="login-container">
    <div class="brand-side">
        <div class="logo-placeholder">
            LOGO AND SLOGAN
        </div>
    </div>

    <div class="form-side">
        <h2>FORGOT AND CHANGE PASSWORD</h2>
        <form id="forgotForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="login-btn">SEND RESET LINK</button>
            <a href="/" class="login-link">Back to Login</a>
            <div class="message_box"></div>
        </form>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// Firebase configuration
const firebaseConfig = {
    apiKey: "AIzaSyA3Edd-rX55dCqqziDEwkasHIdqpXcA5rk",
    authDomain: "cap1-28af8.firebaseapp.com",
    projectId: "cap1-28af8",
    storageBucket: "cap1-28af8.appspot.com",
    messagingSenderId: "720727154833",
    appId: "1:720727154833:web:3acb89547c1b665583df30",
    measurementId: "G-MEE0QVLHQP"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth();

const forgotForm = document.getElementById("forgotForm");
const message = document.querySelector(".message_box");

forgotForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    message.textContent = "";
    message.className = "message_box";

    const email = document.getElementById("email").value.trim();

    try {
        await sendPasswordResetEmail(auth, email);
        message.classList.add("success");
        message.textContent = "Password reset email sent. Check your inbox.";
    } catch (error) {
        console.error("Error sending reset email:", error.message);
        message.classList.add("error");
        message.textContent = "Error: " + error.message;
    }
});
</script>

</body>
</html>
